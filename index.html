<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TICKO | Gestión y Ventas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { darkBg: '#0f172a', darkCard: '#1e293b' } } } }
    </script>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-800 dark:text-slate-100 min-h-screen">

<header class="p-6 border-b border-slate-700 flex justify-between items-center">
    <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-600">TICKO</h1>
    <button onclick="accederAdmin()" class="bg-purple-600 px-4 py-2 rounded-lg font-bold text-sm text-white">🔑 Panel Admin</button>
</header>

<main class="max-w-6xl mx-auto p-6">
    <div id="events-grid" class="grid md:grid-cols-2 gap-6 mb-10"></div>

    <section id="admin-dashboard" class="hidden bg-slate-800 p-6 rounded-2xl mb-10">
        <h2 class="text-2xl font-black mb-6 text-white">🛡️ Consola Administrativa</h2>
        <div class="overflow-x-auto">
            <table class="w-full mb-10 text-sm">
                <thead class="text-slate-400 border-b border-slate-700"><tr><th class="p-2 text-left">Orden</th><th class="text-left">Evento</th><th class="text-left">Status</th><th class="text-left">Acción</th></tr></thead>
                <tbody id="admin-table"></tbody>
            </table>
        </div>
        
        <h3 class="text-xl font-bold mb-4 text-white">📊 Informe Financiero</h3>
        <table class="w-full text-sm">
            <thead class="text-slate-400 border-b border-slate-700"><tr><th class="text-left">Evento</th><th class="text-left">Entradas</th><th class="text-left">Ingresos</th></tr></thead>
            <tbody id="reporte-body"></tbody>
        </table>
    </section>
</main>

<div id="modal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 hidden z-50">
    <div class="bg-white dark:bg-darkCard p-8 rounded-2xl max-w-lg w-full">
        <div id="form-steps" class="space-y-4">
            <h2 id="modal-title" class="text-2xl font-black mb-4"></h2>
            <input type="number" id="q" placeholder="Cantidad de boletos" class="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-900">
            <input type="text" id="name" placeholder="Nombre completo" class="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-900">
            <select id="pay-method" class="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-900"></select>
            <input type="text" id="ref" placeholder="Referencia bancaria" class="w-full p-3 rounded-xl bg-slate-100 dark:bg-slate-900">
            <button onclick="comprar()" class="w-full py-3 bg-gradient-to-r from-pink-500 to-purple-600 rounded-xl font-bold text-white">Confirmar Pago</button>
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="w-full text-slate-400 text-sm">Cancelar</button>
        </div>
        <div id="success-step" class="hidden text-center">
            <h3 class="text-xl font-bold">Transacción en Auditoría</h3>
            <p id="order-code" class="text-3xl font-mono py-4 text-pink-500"></p>
            <p class="text-sm text-slate-400 mb-4">Guarda este código para consultar tu estatus. El equipo validará tu pago en breve.</p>
            <a id="wa-link" target="_blank" class="block bg-green-600 p-3 rounded-xl font-bold text-white">Avisar por WhatsApp</a>
        </div>
    </div>
</div>

<script>
    const events = [
        { id: 1, title: "Jueves de Karaoke", price: 15, pays: ["Pago Móvil: 0412000", "Zelle: p@p.com"] },
        { id: 2, title: "Rock en Vivo", price: 30, pays: ["Binance: ID123", "Efectivo"] }
    ];

    function render() {
        const grid = document.getElementById('events-grid');
        grid.innerHTML = events.map(e => `
            <div class="p-6 bg-white dark:bg-darkCard rounded-2xl border border-slate-700">
                <h3 class="text-2xl font-black">${e.title}</h3>
                <p class="text-pink-500 font-bold mb-4">$${e.price} USD</p>
                <button onclick="openModal(${e.id})" class="w-full py-2 border border-pink-500 rounded-lg hover:bg-pink-500 hover:text-white transition">Comprar</button>
            </div>
        `).join('');
    }

    function openModal(id) {
        const ev = events.find(e => e.id === id);
        document.getElementById('modal-title').innerText = ev.title;
        document.getElementById('pay-method').innerHTML = ev.pays.map(p => `<option>${p}</option>`).join('');
        document.getElementById('modal').classList.remove('hidden');
    }

    function comprar() {
        const title = document.getElementById('modal-title').innerText;
        const ev = events.find(e => e.title === title);
        const orden = {
            id: 'TK-' + Math.random().toString(36).substr(2, 5).toUpperCase(),
            event: title,
            qty: parseInt(document.getElementById('q').value),
            status: 'PENDIENTE',
            total: document.getElementById('q').value * ev.price
        };
        
        let orders = JSON.parse(localStorage.getItem('orders') || '[]');
        orders.push(orden);
        localStorage.setItem('orders', JSON.stringify(orders));
        
        document.getElementById('form-steps').classList.add('hidden');
        document.getElementById('success-step').classList.remove('hidden');
        document.getElementById('order-code').innerText = orden.id;
        document.getElementById('wa-link').href = `https://wa.me/584124723147?text=Nueva orden en Ticko: ${orden.id} - ${title}`;
        actualizarAdmin();
    }

    function accederAdmin() {
        const clave = prompt("Introduce la clave de acceso:");
        if (clave === "admin123") {
            document.getElementById('admin-dashboard').classList.toggle('hidden');
        } else {
            alert("Acceso denegado.");
        }
    }

    function aprobar(id) {
        let orders = JSON.parse(localStorage.getItem('orders'));
        const order = orders.find(o => o.id === id);
        if(order) order.status = 'APROBADO';
        localStorage.setItem('orders', JSON.stringify(orders));
        actualizarAdmin();
    }

    function actualizarAdmin() {
        const orders = JSON.parse(localStorage.getItem('orders') || '[]');
        document.getElementById('admin-table').innerHTML = orders.map(o => `
            <tr class="border-b border-slate-700">
                <td class="p-2 font-mono">${o.id}</td><td>${o.event}</td><td>${o.status}</td>
                <td>${o.status === 'PENDIENTE' ? `<button onclick="aprobar('${o.id}')" class="bg-green-600 px-2 py-1 rounded text-white text-xs">Aprobar</button>` : '✅'}</td>
            </tr>
        `).join('');
        
        const report = events.map(e => {
            const sold = orders.filter(o => o.event === e.title && o.status === 'APROBADO');
            const total = sold.reduce((acc, curr) => acc + curr.total, 0);
            return `<tr><td class="p-2">${e.title}</td><td>${sold.reduce((a, b) => a + b.qty, 0)}</td><td>$${total}</td></tr>`;
        }).join('');
        document.getElementById('reporte-body').innerHTML = report;
    }

    render();
    actualizarAdmin();
</script>
</body>
</html>
