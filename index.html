<!DOCTYPE html>
<html lang="es" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TICKO | Boletería Profesional con QR</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
  tailwind.config = { darkMode: 'class', theme: { extend: { colors: { darkBg: '#0f172a', darkCard: '#1e293b', } } } }
</script>
<style>
  body { font-family: 'Inter', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }
  .explosive-gradient { background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%); }
  .explosive-btn { background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
  .explosive-btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 25px rgba(236, 72, 153, 0.5); }
  .event-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; perspective: 1000px; }
  .event-card:hover { transform: translateY(-10px) rotateX(2deg) rotateY(2deg); box-shadow: 0 20px 40px rgba(236, 72, 153, 0.15); }
</style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-darkBg dark:text-slate-100 min-h-screen flex flex-col">

<header class="w-full bg-white/80 dark:bg-darkCard/80 backdrop-blur-md shadow-lg sticky top-0 z-50 transition-colors duration-300">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <h1 class="font-black text-3xl tracking-tighter text-transparent bg-clip-text explosive-gradient cursor-pointer" onclick="window.location.reload()">TICKO</h1>
    <nav class="flex items-center space-x-6 font-bold text-sm md:text-base">
      <button id="admin-panel-btn" class="text-purple-500 bg-purple-500/10 px-3 py-1.5 rounded-xl border border-purple-500/20 text-xs md:text-sm">🔑 Panel Admin</button>
    </nav>
  </div>
</header>

<main id="main-storefront" class="flex-grow max-w-7xl w-full mx-auto p-6 flex flex-col lg:flex-row gap-8">
  <section id="events-section" class="lg:w-2/3">
    <div id="events" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
  </section>
  <aside class="lg:w-1/3">
    <div id="check-ticket-section" class="bg-gradient-to-br from-slate-900 to-purple-950 text-white rounded-2xl shadow-xl p-6 border border-purple-500/20 sticky top-24">
      <h3 class="text-xl font-black mb-4">🔍 Consultar mi Estatus</h3>
      <input type="text" id="search-ticket-id" placeholder="CÓDIGO DE ORDEN" class="w-full p-3 bg-white/10 rounded-xl mb-3 text-center text-lg font-mono font-bold uppercase" />
      <button id="btn-search-ticket" class="w-full py-3 rounded-xl explosive-btn font-bold">Buscar mi Entrada</button>
      <div id="search-result-box" class="hidden mt-4 p-4 rounded-xl border bg-white/5 text-center"></div>
    </div>
  </aside>
</main>

<section id="admin-dashboard" class="max-w-7xl w-full mx-auto p-6 hidden">
  <h2 class="text-3xl font-black mb-6 text-purple-500">🛡️ Consola Administrativa</h2>
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    <div class="bg-white dark:bg-darkCard p-6 rounded-2xl shadow">
        <h3 class="font-bold mb-4">Órdenes Pendientes</h3>
        <table class="w-full text-sm"><tbody id="admin-table-rows"></tbody></table>
    </div>
    <div class="bg-white dark:bg-darkCard p-6 rounded-2xl shadow">
        <h3 class="font-bold mb-4">📊 Informe Financiero</h3>
        <div id="reporte-body" class="space-y-2 text-sm"></div>
    </div>
  </div>
</section>

<section id="purchase-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
  <div class="bg-white dark:bg-darkCard rounded-2xl max-w-xl w-full p-8 relative">
    <button onclick="document.getElementById('purchase-modal').classList.add('hidden')" class="absolute top-4 right-5 text-2xl font-bold">&times;</button>
    <h2 id="purchase-event-title" class="text-2xl font-black mb-6"></h2>
    <input type="number" id="ticket-quantity" value="1" class="w-full p-3 bg-slate-100 dark:bg-darkBg rounded-xl mb-3" placeholder="Cantidad">
    <input type="text" id="buyer-name" placeholder="Nombre" class="w-full p-3 bg-slate-100 dark:bg-darkBg rounded-xl mb-3">
    <select id="payment-method" class="w-full p-3 bg-slate-100 dark:bg-darkBg rounded-xl mb-3"></select>
    <input type="text" id="payment-reference" placeholder="Referencia" class="w-full p-3 bg-slate-100 dark:bg-darkBg rounded-xl mb-3">
    <button id="btn-comprar" class="w-full py-3 explosive-btn text-white rounded-xl font-bold">Confirmar Compra</button>
  </div>
</section>

<script>
  // 1. EVENTOS CON MÉTODOS DE PAGO INDEPENDIENTES
  const events = [
    { id: 'karaoke', title: "Jueves de Karaoke", img: "https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?auto=format&fit=crop&w=600&q=80", price: 15, pays: ["Pago Móvil: 0412-000", "Zelle: karaoke@test.com"] },
    { id: 'rock', title: "Rock en Vivo", img: "https://images.unsplash.com/photo-1498038432885-c6f3f1b912ee?auto=format&fit=crop&w=600&q=80", price: 30, pays: ["Binance: ID-ROCK", "Efectivo"] }
  ];

  const container = document.getElementById('events');
  events.forEach(ev => {
    container.innerHTML += `
      <div class="event-card bg-white dark:bg-darkCard rounded-2xl overflow-hidden shadow-lg border border-slate-200 dark:border-slate-800">
        <img src="${ev.img}" class="w-full h-48 object-cover">
        <div class="p-6">
            <h3 class="text-2xl font-black">${ev.title}</h3>
            <button onclick="openModal('${ev.id}')" class="mt-4 w-full py-3 explosive-btn text-white rounded-xl font-bold">Comprar ($${ev.price})</button>
        </div>
      </div>`;
  });

  function openModal(id) {
    const ev = events.find(e => e.id === id);
    document.getElementById('purchase-event-title').innerText = ev.title;
    document.getElementById('payment-method').innerHTML = ev.pays.map(p => `<option value="${p}">${p}</option>`).join('');
    document.getElementById('purchase-modal').classList.remove('hidden');
  }

  // 2. COMPRA UNIFICADA (QR ÚNICO)
  document.getElementById('btn-comprar').addEventListener('click', () => {
    const evTitle = document.getElementById('purchase-event-title').innerText;
    const ev = events.find(e => e.title === evTitle);
    const orden = {
      id: 'TK-' + Math.random().toString(36).substr(2, 5).toUpperCase(),
      eventTitle: evTitle,
      qty: parseInt(document.getElementById('ticket-quantity').value),
      total: parseInt(document.getElementById('ticket-quantity').value) * ev.price,
      status: 'PENDIENTE'
    };
    let orders = JSON.parse(localStorage.getItem('ticko_orders') || '[]');
    orders.push(orden);
    localStorage.setItem('ticko_orders', JSON.stringify(orders));
    document.getElementById('purchase-modal').classList.add('hidden');
    alert('Orden Creada: ' + orden.id);
  });

  document.getElementById('btn-search-ticket').addEventListener('click', () => {
    const id = document.getElementById('search-ticket-id').value.toUpperCase();
    const orders = JSON.parse(localStorage.getItem('ticko_orders') || '[]');
    const o = orders.find(x => x.id === id);
    const box = document.getElementById('search-result-box');
    box.classList.remove('hidden');
    if(!o) box.innerHTML = "❌ No encontrado";
    else if(o.status === 'PENDIENTE') box.innerHTML = "⏳ En Auditoría";
    else {
      box.innerHTML = `<p class="font-bold">✅ Aprobado</p><canvas id="qr-canvas"></canvas>`;
      QRCode.toCanvas(document.getElementById('qr-canvas'), JSON.stringify(o), {width: 120});
    }
  });

  // 3 y 4. ADMIN CON CLAVE Y REPORTE FINANCIERO
  document.getElementById('admin-panel-btn').addEventListener('click', () => {
    if(prompt("Clave:") === "admin123") {
      document.getElementById('admin-dashboard').classList.toggle('hidden');
      updateAdmin();
    } else alert("Error");
  });

  function updateAdmin() {
    const orders = JSON.parse(localStorage.getItem('ticko_orders') || '[]');
    document.getElementById('admin-table-rows').innerHTML = orders.map(o => `
      <tr class="border-b"><td>${o.id}</td><td>${o.status}</td>
      <td><button onclick="ap('${o.id}')" class="text-green-500 font-bold">Aprobar</button></td></tr>`).join('');
    
    document.getElementById('reporte-body').innerHTML = events.map(ev => {
      const sold = orders.filter(o => o.eventTitle === ev.title && o.status === 'APROBADO');
      return `<div class="p-2 bg-slate-800 rounded text-white">${ev.title}: ${sold.length} entradas | <strong>$${sold.reduce((a,b)=>a+b.total,0)}</strong></div>`;
    }).join('');
  }

  function ap(id) {
    let o = JSON.parse(localStorage.getItem('ticko_orders'));
    o.find(x => x.id === id).status = 'APROBADO';
    localStorage.setItem('ticko_orders', JSON.stringify(o));
    updateAdmin();
  }
</script>
</body>
</html>
