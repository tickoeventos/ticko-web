<!DOCTYPE html>
<html lang="es" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TICKO | Boletería Profesional con QR</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
  tailwind.config = { darkMode: 'class', theme: { extend: { colors: { darkBg: '#0f172a', darkCard: '#1e293b', } } } }
</script>
<style>
  body { font-family: 'Inter', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }
  .explosive-gradient { background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%); }
  .explosive-btn { background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
  .explosive-btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 25px rgba(236, 72, 153, 0.5); }
  .event-card { transition: all 0.4s; }
  .event-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(236, 72, 153, 0.15); }
</style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-darkBg dark:text-slate-100 min-h-screen">

<header class="w-full bg-white/80 dark:bg-darkCard/80 backdrop-blur-md shadow-lg sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <h1 class="font-black text-3xl explosive-gradient text-transparent bg-clip-text cursor-pointer" onclick="window.location.reload()">TICKO</h1>
    <button id="admin-panel-btn" class="text-purple-500 bg-purple-500/10 px-4 py-2 rounded-xl font-bold border border-purple-500/20 text-sm">🔑 Panel Admin</button>
  </div>
</header>

<main id="main-storefront" class="max-w-7xl w-full mx-auto p-6 flex flex-col lg:flex-row gap-8">
  <section id="events-section" class="lg:w-2/3">
    <div id="events" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
  </section>
  <aside class="lg:w-1/3">
    <div id="check-ticket-section" class="bg-slate-900 text-white rounded-2xl p-6 shadow-xl border border-purple-500/20 sticky top-24">
      <h3 class="text-xl font-black mb-2">🔍 Consultar Estatus</h3>
      <input type="text" id="search-ticket-id" placeholder="CÓDIGO DE ORDEN" class="w-full p-3 bg-white/10 rounded-xl mb-3 text-center uppercase font-bold" />
      <button id="btn-search-ticket" class="w-full py-3 rounded-xl explosive-btn font-bold">Buscar mi Entrada</button>
      <div id="search-result-box" class="hidden mt-4 p-4 rounded-xl border bg-white/5 text-center"></div>
    </div>
  </aside>
</main>

<section id="admin-dashboard" class="max-w-7xl w-full mx-auto p-6 hidden">
  <h2 class="text-3xl font-black mb-6">🛡️ Consola Administrativa</h2>
  
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    <div class="bg-white dark:bg-darkCard p-6 rounded-2xl">
      <h3 class="font-bold mb-4">Órdenes Pendientes</h3>
      <table class="w-full text-sm">
        <tbody id="admin-table-rows"></tbody>
      </table>
    </div>
    
    <div class="bg-white dark:bg-darkCard p-6 rounded-2xl">
      <h3 class="font-bold mb-4">📊 Informe Financiero por Evento</h3>
      <div id="reporte-body" class="space-y-4"></div>
    </div>
  </div>
</section>

<section id="purchase-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
  <div class="bg-white dark:bg-darkCard rounded-2xl max-w-xl w-full p-8 relative">
    <button id="close-modal" class="absolute top-4 right-5 text-2xl font-bold">&times;</button>
    <h2 id="purchase-event-title" class="text-2xl font-black mb-6"></h2>
    <div id="step-1" class="step">
      <input type="number" id="ticket-quantity" value="1" class="w-full p-3 bg-slate-100 dark:bg-darkBg rounded-xl mb-3">
      <input type="text" id="buyer-name" placeholder="Nombre" class="w-full p-3 bg-slate-100 dark:bg-darkBg rounded-xl mb-3">
      <select id="payment-method" class="w-full p-3 bg-slate-100 dark:bg-darkBg rounded-xl mb-3"></select>
      <input type="text" id="payment-reference" placeholder="Referencia" class="w-full p-3 bg-slate-100 dark:bg-darkBg rounded-xl mb-3">
      <button id="btn-comprar" class="w-full py-3 explosive-btn rounded-xl font-bold">Comprar</button>
    </div>
  </div>
</section>

<script>
  // 1. CONFIGURACIÓN DE EVENTOS CON PAGOS INDEPENDIENTES
  const events = [
    { id: 'karaoke', title: "Jueves de Karaoke", priceUSD: 15, pays: ["Pago Móvil: 0412-000", "Zelle: karaoke@test.com"] },
    { id: 'rock', title: "Rock en Vivo", priceUSD: 30, pays: ["Binance: ID-ROCK", "Efectivo"] }
  ];

  // 2. RENDERIZAR
  const container = document.getElementById('events');
  events.forEach(ev => {
    container.innerHTML += `<div class="event-card p-6 bg-white dark:bg-darkCard rounded-2xl">
      <h3 class="text-xl font-bold">${ev.title}</h3>
      <button onclick="openModal('${ev.id}')" class="mt-4 w-full py-2 bg-pink-500 rounded-lg font-bold">Comprar</button>
    </div>`;
  });

  function openModal(id) {
    const ev = events.find(e => e.id === id);
    document.getElementById('purchase-event-title').innerText = ev.title;
    const select = document.getElementById('payment-method');
    select.innerHTML = ev.pays.map(p => `<option value="${p}">${p}</option>`).join('');
    document.getElementById('purchase-modal').classList.remove('hidden');
  }

  // 3. LÓGICA DE COMPRA Y ADMIN
  document.getElementById('btn-comprar').addEventListener('click', () => {
    const orden = {
      ordenId: 'TK-' + Math.random().toString(36).substr(2, 5).toUpperCase(),
      eventTitle: document.getElementById('purchase-event-title').innerText,
      qty: parseInt(document.getElementById('ticket-quantity').value),
      status: 'PENDIENTE',
      totalCost: parseInt(document.getElementById('ticket-quantity').value) * 15
    };
    let orders = JSON.parse(localStorage.getItem('ticko_orders') || '[]');
    orders.push(orden);
    localStorage.setItem('ticko_orders', JSON.stringify(orders));
    alert('Orden registrada: ' + orden.ordenId);
    document.getElementById('purchase-modal').classList.add('hidden');
    updateAdminDashboard();
  });

  // 4. SEGURIDAD ADMIN Y REPORTE
  document.getElementById('admin-panel-btn').addEventListener('click', () => {
    const clave = prompt("Clave de acceso:");
    if (clave === "admin123") {
      document.getElementById('admin-dashboard').classList.remove('hidden');
      updateAdminDashboard();
    } else { alert("Acceso denegado"); }
  });

  function updateAdminDashboard() {
    const orders = JSON.parse(localStorage.getItem('ticko_orders') || '[]');
    document.getElementById('admin-table-rows').innerHTML = orders.map(o => `<tr><td>${o.ordenId}</td><td>${o.status}</td><td><button onclick="aprobar('${o.ordenId}')" class="text-green-500">Aprobar</button></td></tr>`).join('');
    
    // Informe financiero dinámico
    document.getElementById('reporte-body').innerHTML = events.map(ev => {
      const vendidas = orders.filter(o => o.eventTitle === ev.title && o.status === 'APROBADO');
      const total = vendidas.reduce((a, b) => a + b.totalCost, 0);
      return `<div class="p-3 bg-slate-700 rounded-lg">${ev.title}: ${vendidas.length} entradas - $${total}</div>`;
    }).join('');
  }

  function aprobar(id) {
    let orders = JSON.parse(localStorage.getItem('ticko_orders'));
    orders.find(o => o.ordenId === id).status = 'APROBADO';
    localStorage.setItem('ticko_orders', JSON.stringify(orders));
    updateAdminDashboard();
  }
</script>
</body>
</html>
